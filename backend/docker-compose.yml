services:
  mysql:
    image: mysql:8.4
    container_name: event-planner-db

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: event_planner
      MYSQL_USER: event_user
      MYSQL_PASSWORD: event_planner

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
