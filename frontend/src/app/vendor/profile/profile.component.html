<div id="profile" *ngIf="vendor; else loader">
    <div class="data-box container">

        <div class="d-flex justify-content-between w-100">
            <h2 class="mb-3">Organisation Details</h2>
            <img src="assets/edit.svg" id="edit-image" (click)="editMajorDetails()" [hidden]="!readMode" />
        </div>

        <div class="row g-3">

            <div class="col-md-6">
                <div class="form-floating">
                    <input type="text" class="form-control" id="orgName" placeholder="josh" [disabled]="readMode" [(ngModel)]="vendor.orgName">
                    <label for="orgName">Organisation Name</label>
                </div>
            </div>

            <div class="col-md-6">
                <div class="form-floating">
                    <input type="text" class="form-control" id="address" placeholder="josh" [disabled]="readMode" [(ngModel)]="vendor.officeAddress">
                    <label for="address">Address</label>
                </div>
            </div>

            <div class="col-md-6">
                <div class="form-floating">
                    <input type="text" class="form-control" id="status" placeholder="josh" [disabled]="true" [(ngModel)]="statusMessage">
                    <label for="status">Status</label>
                </div>
            </div>

            <div class="col-md-6">
                <div class="form-floating">
                    <input type="date" class="form-control" id="suspendedDate" placeholder="josh" [disabled]="true" [(ngModel)]="vendor.suspendedDate">
                    <label for="suspendedDate">Suspended Date</label>
                </div>
            </div>

        </div>

        <button class="btn btn-success mt-3" [hidden]="readMode" (click)="updateMajorDetails()">Save</button>
        <button class="btn btn-secondary mt-3 ms-3" [hidden]="readMode" (click)="cancelMajorDetails()">Cancel</button>

    </div>
    <button 
    class="mt-3 w-100 container message-button" 
    >{{buttonMessage}}</button>
</div>

<ng-template #loader>
    <div class="d-flex w-100 h-100 justify-content-center align-items-center" style="background-color: var(--background-grey);">
        <div class="spinner-border text-danger" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>
</ng-template>
